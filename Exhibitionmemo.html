<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<title>展示会メモ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  background: #0f0f1a; color: #f0f0f0;
  min-height: 100vh; max-width: 480px; margin: 0 auto;
}
header {
  padding: 16px 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
header h1 { font-size: 17px; font-weight: 600; }
#count-label {
  font-size: 13px; color: #a0a0c0;
  background: rgba(255,255,255,0.07);
  padding: 4px 12px; border-radius: 20px;
}
#cam-wrap { position: relative; background: #000; aspect-ratio: 4/3; overflow: hidden; }
#video { width: 100%; height: 100%; object-fit: cover; display: block; }
#rec-badge {
  display: none; position: absolute; top: 12px; right: 12px;
  background: #e53e3e; color: #fff; font-size: 13px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px;
  animation: pulse 1s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
#timer-wrap { display: none; position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); }
#timer-wrap svg { width: 72px; height: 72px; transform: rotate(-90deg); }
#timer-wrap circle { fill: none; stroke-width: 5; }
.ring-bg { stroke: rgba(255,255,255,0.2); }
.ring-fg { stroke: #63b3ed; stroke-linecap: round; stroke-dasharray: 197.9; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear; }
#timer-num { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 26px; font-weight: 700; color: #fff; }
#prog-wrap { height: 5px; background: rgba(255,255,255,0.1); }
#prog-bar { height: 100%; width: 0; background: #e53e3e; transition: width 1s linear; }
#btn-area { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.btn { width: 100%; padding: 18px; font-size: 18px; font-weight: 600; font-family: inherit; border: none; border-radius: 14px; cursor: pointer; transition: transform 0.1s, opacity 0.15s; }
.btn:active { transform: scale(0.97); opacity: 0.8; }
.btn:disabled { opacity: 0.35; pointer-events: none; }
#btn-rec { background: #e53e3e; color: #fff; font-size: 20px; padding: 22px; }
#btn-end { background: rgba(255,255,255,0.1); color: #a0a0c0; font-size: 15px; padding: 14px; }
#list-header { padding: 8px 20px; font-size: 12px; color: #606080; letter-spacing: 0.08em; display: none; }
#list-area { padding: 0 20px 40px; display: flex; flex-direction: column; gap: 10px; }
.item-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.item-left { display: flex; align-items: center; gap: 12px; }
.item-num { width: 36px; height: 36px; border-radius: 50%; background: rgba(99,179,237,0.15); color: #63b3ed; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.item-info { font-size: 13px; }
.item-time { color: #a0a0c0; font-size: 11px; margin-top: 2px; }
.btn-dl { padding: 7px 14px; font-size: 12px; font-family: inherit; background: rgba(99,179,237,0.12); color: #63b3ed; border: 1px solid rgba(99,179,237,0.25); border-radius: 8px; cursor: pointer; }
#overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 100; }
#overlay.show { display: flex; }
#overlay .icon { font-size: 56px; }
#overlay .msg { font-size: 20px; font-weight: 600; }
#overlay .sub { font-size: 14px; color: #a0a0c0; }
</style>
</head>
<body>
<header>
  <h1>📷 展示会メモ</h1>
  <div id="count-label">0件</div>
</header>
<div id="cam-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="rec-badge">● REC</div>
  <div id="timer-wrap">
    <svg viewBox="0 0 72 72">
      <circle class="ring-bg" cx="36" cy="36" r="31.5"/>
      <circle class="ring-fg" id="ring-fg" cx="36" cy="36" r="31.5"/>
    </svg>
    <div id="timer-num">10</div>
  </div>
</div>
<div id="prog-wrap"><div id="prog-bar"></div></div>
<div id="btn-area">
  <button class="btn" id="btn-rec" onclick="startRec()">⏺ 録画スタート</button>
  <button class="btn" id="btn-end" onclick="endSession()" disabled>終了</button>
</div>
<div id="list-header">保存した動画</div>
<div id="list-area"></div>
<div id="overlay">
  <div class="icon">✅</div>
  <div class="msg" id="ov-msg"></div>
  <div class="sub" id="ov-sub"></div>
</div>
<script>
const CIRC = 2 * Math.PI * 31.5;
let stream=null, recorder=null, chunks=[], items=[], timerInterval=null, recording=false;
window.addEventListener('load', initCamera);
async function initCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}, audio:true
    });
    document.getElementById('video').srcObject = stream;
  } catch(e) { alert('カメラとマイクの許可が必要です。'); }
}
function startRec() {
  if (recording||!stream) return;
  recording=true;
  document.getElementById('btn-rec').disabled=true;
  document.getElementById('btn-rec').textContent='録画中...';
  document.getElementById('btn-end').disabled=false;
  document.getElementById('rec-badge').style.display='block';
  document.getElementById('timer-wrap').style.display='block';
  const ring=document.getElementById('ring-fg');
  ring.style.transition='none'; ring.style.strokeDashoffset=0;
  setTimeout(()=>{ ring.style.transition='stroke-dashoffset 10s linear'; ring.style.strokeDashoffset=CIRC; },50);
  const bar=document.getElementById('prog-bar');
  bar.style.transition='none'; bar.style.width='0';
  setTimeout(()=>{ bar.style.transition='width 10s linear'; bar.style.width='100%'; },50);
  chunks=[];
  recorder=new MediaRecorder(stream,{mimeType:getSupportedMime()});
  recorder.ondataavailable=e=>{ if(e.data.size>0) chunks.push(e.data); };
  recorder.onstop=saveVideo;
  recorder.start();
  let sec=10;
  document.getElementById('timer-num').textContent=sec;
  timerInterval=setInterval(()=>{ sec--; document.getElementById('timer-num').textContent=sec; if(sec<=0){clearInterval(timerInterval);recorder.stop();} },1000);
}
function getSupportedMime() {
  const types=['video/webm;codecs=vp9,opus','video/webm;codecs=vp8,opus','video/webm','video/mp4'];
  for(const t of types){ if(MediaRecorder.isTypeSupported(t)) return t; }
  return '';
}
function saveVideo() {
  recording=false;
  const mime=getSupportedMime();
  const ext=mime.includes('mp4')?'mp4':'webm';
  const blob=new Blob(chunks,{type:mime});
  const url=URL.createObjectURL(blob);
  const now=new Date();
  const label=(now.getMonth()+1)+'/'+now.getDate()+' '+now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  items.push({url,label,blob,ext,num:items.length+1});
  document.getElementById('count-label').textContent=items.length+'件';
  document.getElementById('rec-badge').style.display='none';
  document.getElementById('timer-wrap').style.display='none';
  showOverlay('✅','保存しました！',items.length+'件目');
  renderList();
  setTimeout(()=>{ hideOverlay(); document.getElementById('btn-rec').disabled=false; document.getElementById('btn-rec').textContent='⏺ 録画スタート'; document.getElementById('prog-bar').style.transition='none'; document.getElementById('prog-bar').style.width='0'; },1200);
}
function endSession() {
  if(recording){clearInterval(timerInterval);recorder.stop();return;}
  showOverlay('📁','撮影終了','合計 '+items.length+'件保存されました');
  document.getElementById('btn-rec').disabled=true;
  document.getElementById('btn-end').disabled=true;
}
function showOverlay(icon,msg,sub) {
  document.getElementById('ov-msg').textContent=msg;
  document.getElementById('ov-sub').textContent=sub;
  document.querySelector('#overlay .icon').textContent=icon;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay(){ document.getElementById('overlay').classList.remove('show'); }
function renderList() {
  document.getElementById('list-header').style.display='block';
  const list=document.getElementById('list-area');
  list.innerHTML='';
  [...items].reverse().forEach(item=>{
    const div=document.createElement('div');
    div.className='item-card';
    div.innerHTML=`<div class="item-left"><div class="item-num">${item.num}</div><div class="item-info">動画 ${item.num}<div class="item-time">${item.label}</div></div></div><button class="btn-dl" onclick="dlVideo(${item.num-1})">↓ 保存</button>`;
    list.appendChild(div);
  });
}
function dlVideo(i){ const a=document.createElement('a'); a.href=items[i].url; a.download='video_'+items[i].label.replace(/[\/: ]/g,'.')+'.'+items[i].ext; a.click(); }
</script>
</body>
</html>
