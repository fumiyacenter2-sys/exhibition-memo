<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f1a">
  <title>展示会メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      max-width: 480px;
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    header h1 { font-size: 17px; font-weight: 600; }
    #count-label {
      font-size: 13px;
      color: #a0a0c0;
      background: rgba(255,255,255,0.07);
      padding: 4px 12px;
      border-radius: 20px;
    }
    #camera-wrap {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 4/3;
      background: #000;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 16px;
      pointer-events: none;
    }
    #status-badge {
      font-size: 13px;
      font-weight: 600;
      padding: 4px 16px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .s-standby { background: rgba(0,0,0,0.55); color: #fff; }
    .s-rec     { background: #e02020; color: #fff; }
    .s-saving  { background: rgba(0,0,0,0.55); color: #aaa; }
    #count-down {
      font-size: 52px;
      font-weight: 200;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0,0,0,0.9);
      display: none;
      margin-bottom: 6px;
    }
    #progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 5px;
      background: #e02020;
      width: 0%;
    }
    #controls {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 10px;
    }
    #rec-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      border: 4px solid #555;
      background: #1a1a2e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    #rec-btn:active { transform: scale(0.91); }
    #rec-inner {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e02020;
      transition: border-radius 0.2s, width 0.2s, height 0.2s;
    }
    #rec-btn.recording #rec-inner {
      border-radius: 8px;
      width: 30px;
      height: 30px;
    }
    #rec-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #hint { font-size: 13px; color: #777; }
    #saved-msg {
      font-size: 13px;
      color: #4caf50;
      font-weight: 500;
      min-height: 18px;
      text-align: center;
    }
    #error-msg {
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
      padding: 0 16px;
      display: none;
    }
    #gallery {
      width: 100%;
      max-width: 480px;
      padding: 0 16px 40px;
    }
    #gallery-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
      display: none;
    }
    #clips-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }
    .clip-item {
      border-radius: 8px;
      overflow: hidden;
      border: 0.5px solid #2a2a3a;
      background: #1a1a2e;
      position: relative;
    }
    .clip-item video {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
    }
    .clip-num {
      position: absolute;
      top: 4px; left: 4px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 8px;
    }
    .saved-badge {
      position: absolute;
      top: 4px; right: 4px;
      background: rgba(30,160,80,0.85);
      color: #fff;
      font-size: 9px;
      padding: 2px 5px;
      border-radius: 6px;
    }
    .dl-btn {
      display: block;
      width: 100%;
      padding: 6px 0;
      font-size: 11px;
      font-weight: 500;
      text-align: center;
      background: #1e3a5f;
      color: #7eb8f7;
      border: none;
      cursor: pointer;
      border-top: 0.5px solid #2a2a3a;
    }
  </style>
</head>
<body>
  <header>
    <h1>展示会ビデオメモ</h1>
    <span id="count-label">0 クリップ</span>
  </header>

  <div id="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div id="overlay">
      <div id="count-down">10</div>
      <span id="status-badge" class="s-standby">スタンバイ</span>
    </div>
    <div id="progress"></div>
  </div>

  <div id="controls">
    <button id="rec-btn" disabled>
      <div id="rec-inner"></div>
    </button>
    <div id="hint">タップで10秒録画・自動保存</div>
    <div id="saved-msg"></div>
    <div id="error-msg"></div>
  </div>

  <div id="gallery">
    <div id="gallery-title">撮影済み（再ダウンロード可）</div>
    <div id="clips-grid"></div>
  </div>

  <script>
    let stream, mediaRecorder, chunks = [], clipCount = 0, timerInterval;

    const videoEl     = document.getElementById('video');
    const recBtn      = document.getElementById('rec-btn');
    const statusBadge = document.getElementById('status-badge');
    const countDown   = document.getElementById('count-down');
    const progressEl  = document.getElementById('progress');
    const savedMsg    = document.getElementById('saved-msg');
    const countLabel  = document.getElementById('count-label');
    const galleryTitle= document.getElementById('gallery-title');
    const clipsGrid   = document.getElementById('clips-grid');
    const errorMsg    = document.getElementById('error-msg');

    function pad(n) { return String(n).padStart(2,'0'); }

    function getTimestamp() {
      const d = new Date();
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }

    // iPad/iOSはmp4のみ対応
    function getMimeType() {
      const types = [
        'video/mp4;codecs=avc1',
        'video/mp4',
        'video/webm;codecs=vp9',
        'video/webm'
      ];
      for (const t of types) {
        if (MediaRecorder.isTypeSupported(t)) return t;
      }
      return '';
    }

    function getExt(mimeType) {
      return mimeType.includes('mp4') ? 'mp4' : 'webm';
    }

    async function init() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true
        });
        videoEl.srcObject = stream;
        recBtn.disabled = false;
      } catch(e) {
        errorMsg.style.display = 'block';
        errorMsg.textContent = 'カメラの許可が必要です。ブラウザの設定でカメラをONにしてください。';
      }
    }

    function startRec() {
      chunks = [];
      const mimeType = getMimeType();
      const options = mimeType ? { mimeType } : {};
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = saveClip;
      mediaRecorder.start();

      recBtn.classList.add('recording');
      recBtn.disabled = true;
      statusBadge.textContent = '● REC';
      statusBadge.className = 's-rec';
      countDown.style.display = 'block';
      savedMsg.textContent = '';

      progressEl.style.transition = 'none';
      progressEl.style.width = '0%';
      setTimeout(() => {
        progressEl.style.transition = 'width 10s linear';
        progressEl.style.width = '100%';
      }, 50);

      let secs = 10;
      countDown.textContent = secs;
      timerInterval = setInterval(() => {
        secs--;
        countDown.textContent = secs;
        if (secs <= 0) {
          clearInterval(timerInterval);
          mediaRecorder.stop();
        }
      }, 1000);
    }

    function saveClip() {
      clipCount++;
      const mimeType = chunks[0]?.type || 'video/mp4';
      const ext = getExt(mimeType);
      const filename = `展示会_${getTimestamp()}_${clipCount}.${ext}`;
      const blob = new Blob(chunks, { type: mimeType });
      const url = URL.createObjectURL(blob);

      // 自動ダウンロード
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      savedMsg.textContent = `✅ 保存: ${filename}`;
      countLabel.textContent = `${clipCount} クリップ`;

      // ギャラリーに追加
      const item = document.createElement('div');
      item.className = 'clip-item';
      item.innerHTML = `
        <video src="${url}" muted playsinline loop></video>
        <span class="clip-num">${clipCount}</span>
        <span class="saved-badge">済</span>
        <button class="dl-btn">📥 再保存</button>
      `;
      item.querySelector('video').addEventListener('click', function() {
        this.paused ? this.play() : this.pause();
      });
      item.querySelector('.dl-btn').addEventListener('click', () => {
        const a2 = document.createElement('a');
        a2.href = url;
        a2.download = filename;
        a2.click();
      });
      clipsGrid.prepend(item);
      galleryTitle.style.display = 'block';

      setTimeout(() => {
        recBtn.classList.remove('recording');
        recBtn.disabled = false;
        statusBadge.textContent = 'スタンバイ';
        statusBadge.className = 's-standby';
        countDown.style.display = 'none';
        progressEl.style.transition = 'none';
        progressEl.style.width = '0%';
      }, 500);
    }

    recBtn.addEventListener('click', startRec);
    init();
  </script>
</body>
</html>
