<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f0f1a">
  <title>展示会メモ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: #000;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #camera-wrap {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }
    #top-bar h1 { font-size: 16px; font-weight: 600; color: #fff; }
    #count-label {
      font-size: 13px;
      color: #fff;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 20px;
    }
    #status-badge {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 600;
      padding: 5px 18px;
      border-radius: 20px;
      letter-spacing: 0.06em;
      pointer-events: none;
    }
    .s-standby { background: transparent; color: transparent; }
    .s-rec     { background: #e02020; color: #fff; }
    .s-saving  { background: rgba(0,0,0,0.55); color: #aaa; }
    #count-down {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 80px;
      font-weight: 200;
      color: #fff;
      text-shadow: 0 2px 20px rgba(0,0,0,0.9);
      display: none;
      pointer-events: none;
    }
    #progress {
      position: absolute;
      bottom: 0; left: 0;
      height: 5px;
      background: #e02020;
      width: 0%;
    }
    #saved-msg {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: #4caf50;
      font-weight: 500;
      white-space: nowrap;
      pointer-events: none;
    }
    #error-msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #ff6b6b;
      text-align: center;
      padding: 0 20px;
      display: none;
      pointer-events: none;
    }
    #bottom-bar {
      background: #000;
      padding: 16px 0 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #rec-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 4px solid #555;
      background: #1a1a1a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s;
    }
    #rec-btn:active { transform: scale(0.91); }
    #rec-inner {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: #e02020;
      transition: border-radius 0.2s, width 0.2s, height 0.2s;
    }
    #rec-btn.recording #rec-inner {
      border-radius: 8px;
      width: 32px;
      height: 32px;
    }
    #rec-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #hint { font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div id="camera-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div id="top-bar">
      <h1>展示会メモ</h1>
      <span id="count-label">0 クリップ</span>
    </div>
    <span id="status-badge" class="s-standby">スタンバイ</span>
    <div id="count-down">10</div>
    <div id="progress"></div>
    <div id="saved-msg"></div>
    <div id="error-msg">カメラの許可が必要です。<br>ブラウザの設定でカメラをONにしてください。</div>
  </div>

  <div id="bottom-bar">
    <button id="rec-btn" disabled>
      <div id="rec-inner"></div>
    </button>
    <div id="hint">タップで10秒録画・自動保存</div>
  </div>

  <script>
    let stream, mediaRecorder, chunks = [], clipCount = 0, timerInterval;
    const videoEl     = document.getElementById('video');
    const recBtn      = document.getElementById('rec-btn');
    const statusBadge = document.getElementById('status-badge');
    const countDown   = document.getElementById('count-down');
    const progressEl  = document.getElementById('progress');
    const savedMsg    = document.getElementById('saved-msg');
    const countLabel  = document.getElementById('count-label');
    const errorMsg    = document.getElementById('error-msg');

    function pad(n) { return String(n).padStart(2,'0'); }
    function getTimestamp() {
      const d = new Date();
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }
    function getMimeType() {
      const types = ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm'];
      for (const t of types) { if (MediaRecorder.isTypeSupported(t)) return t; }
      return '';
    }
    function getExt(mimeType) { return mimeType.includes('mp4') ? 'mp4' : 'webm'; }

    async function init() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: true
        });
        videoEl.srcObject = stream;
        recBtn.disabled = false;
      } catch(e) {
        errorMsg.style.display = 'block';
      }
    }

    function startRec() {
      chunks = [];
      const mimeType = getMimeType();
      const options = mimeType ? { mimeType } : {};
      mediaRecorder = new MediaRecorder(stream, options);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = saveClip;
      mediaRecorder.start();
      recBtn.classList.add('recording');
      recBtn.disabled = true;
      statusBadge.textContent = '● REC';
      statusBadge.className = 's-rec';
      countDown.style.display = 'block';
      savedMsg.textContent = '';
      progressEl.style.transition = 'none';
      progressEl.style.width = '0%';
      setTimeout(() => {
        progressEl.style.transition = 'width 10s linear';
        progressEl.style.width = '100%';
      }, 50);
      let secs = 10;
      countDown.textContent = secs;
      timerInterval = setInterval(() => {
        secs--;
        countDown.textContent = secs;
        if (secs <= 0) { clearInterval(timerInterval); mediaRecorder.stop(); }
      }, 1000);
    }

    function saveClip() {
      clipCount++;
      const mimeType = chunks[0]?.type || 'video/mp4';
      const ext = getExt(mimeType);
      const filename = `展示会_${getTimestamp()}_${clipCount}.${ext}`;
      const blob = new Blob(chunks, { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      savedMsg.textContent = `✅ 保存: ${filename}`;
      countLabel.textContent = `${clipCount} クリップ`;
      setTimeout(() => {
        recBtn.classList.remove('recording');
        recBtn.disabled = false;
        statusBadge.textContent = '';
        statusBadge.className = 's-standby';
        countDown.style.display = 'none';
        progressEl.style.transition = 'none';
        progressEl.style.width = '0%';
      }, 500);
    }

    recBtn.addEventListener('click', startRec);
    init();
  </script>
</body>
</html>
